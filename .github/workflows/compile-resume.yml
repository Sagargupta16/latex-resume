name: Compile Resume

on:
  push:
    branches: [main]
    paths:
      - "resume.tex"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          latexmk_use_xelatex: false

      - name: Archive previous resume
        run: |
          git checkout origin/main -- resume.pdf 2>/dev/null || true
          if [ -f resume.pdf ]; then
            mkdir -p resume-old
            DATE=$(date +%Y-%m-%d)
            HASH=$(git rev-parse --short HEAD)
            cp resume.pdf "resume-old/resume-${DATE}-${HASH}.pdf"
          fi
          git checkout -- . 2>/dev/null || true

      - name: Verify compiled PDF exists
        run: ls -la resume.pdf

      - name: Commit and push PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.pdf resume-old/
          git diff --staged --quiet || git commit -m "chore: auto-compile resume PDF"
          git push

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: resume.pdf
          retention-days: 90

  release:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (with compiled PDF)
        run: git pull origin main

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Resume - ${{ steps.date.outputs.date }}"
          body: |
            Auto-compiled resume PDF from latest `resume.tex`.

            Updated on ${{ steps.date.outputs.date }}.
          files: resume.pdf
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
