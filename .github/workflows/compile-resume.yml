name: Compile Resume

on:
  push:
    branches: [main]
    paths:
      - "common/*.tex"
      - "variants/**/*.tex"
      - "cover-letters/*.tex"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: compile-resume
  cancel-in-progress: false

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install LaTeX + Carlito + fontawesome
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-fonts-extra \
            fonts-carlito \
            latexmk

      - name: Compile all variants
        run: |
          set -e
          mkdir -p builds
          declare -A ROOTS=(
            [general]=variants/general/resume.tex
            [devops]=variants/devops/resume-devops.tex
            [cloud]=variants/cloud/resume-cloud.tex
            [mlops]=variants/mlops/resume-mlops.tex
            [aiml]=variants/aiml/resume-aiml.tex
            [sde]=variants/sde/resume-sde.tex
            [platform]=variants/platform/resume-platform.tex
            [ai-tools]=variants/ai-tools/resume-ai-tools.tex
            [bigtech]=variants/bigtech/resume-bigtech.tex
          )
          for slug in "${!ROOTS[@]}"; do
            root="${ROOTS[$slug]}"
            dir=$(dirname "$root")
            name=$(basename "$root" .tex)
            (cd "$dir" && pdflatex -interaction=nonstopmode "$name.tex") \
              || { echo "::error::compile failed for $slug"; exit 1; }
            if [ "$slug" = general ]; then
              cp "$dir/$name.pdf" resume.pdf
            else
              cp "$dir/$name.pdf" "builds/$name.pdf"
            fi
          done

      - name: Compile cover letters
        run: |
          set -e
          mkdir -p cover-letters/pdf
          shopt -s nullglob
          for tex in cover-letters/*.tex; do
            base=$(basename "$tex" .tex)
            # Skip the template -- it has unfilled placeholders.
            if [ "$base" = template ]; then
              continue
            fi
            (cd cover-letters && pdflatex -interaction=nonstopmode "$base.tex") \
              || { echo "::error::cover-letter compile failed for $base"; exit 1; }
            mv "cover-letters/$base.pdf" "cover-letters/pdf/$base.pdf"
          done

      - name: Archive previous general resume
        run: |
          # Grab the previously-published PDF from origin/main and the commit
          # that actually last modified it -- not the trigger commit.
          if git show "origin/main:resume.pdf" > /tmp/prev-resume.pdf 2>/dev/null; then
            mkdir -p resume-old
            DATE=$(date +%Y-%m-%d)
            HASH=$(git log -1 --pretty=%h origin/main -- resume.pdf)
            cp /tmp/prev-resume.pdf "resume-old/resume-${DATE}-${HASH}.pdf"
          fi

      - name: Verify all PDFs exist
        run: |
          echo "=== General ==="
          ls -la resume.pdf
          echo "=== Variants ==="
          ls -la builds/
          echo "=== Cover letters ==="
          ls -la cover-letters/pdf/ 2>/dev/null || echo "(none)"

      - name: Commit and push PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.pdf resume-old/ builds/ cover-letters/pdf/
          git diff --staged --quiet || git commit -m "chore: auto-compile resume PDFs [skip ci]"
          git push

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v7
        with:
          name: resume-pdfs
          path: |
            resume.pdf
            builds/*.pdf
            cover-letters/pdf/*.pdf
          retention-days: 90

  release:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Pull latest (with compiled PDFs)
        run: git pull origin main

      - name: Determine version bump
        id: bump
        env:
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          CURRENT=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Read the commit that triggered this workflow run, not HEAD.
          # The compile job auto-commits "chore: auto-compile resume PDFs"
          # before this job runs, so `git log -1` would see the bot's message.
          # Fall back to `git log -1` for manual workflow_dispatch runs where
          # github.event.head_commit may be empty.
          MSG="${HEAD_COMMIT_MSG:-$(git log -1 --pretty=%B)}"
          echo "Trigger commit message: $MSG"

          if echo "$MSG" | grep -qi '\[major\]'; then
            MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          elif echo "$MSG" | grep -qi '\[minor\]'; then
            MINOR=$((MINOR+1)); PATCH=0
          else
            PATCH=$((PATCH+1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "next=$NEXT" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump.outputs.next }}" > VERSION

      - name: Update CHANGELOG
        env:
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          NEXT="${{ steps.bump.outputs.next }}"
          DATE=$(date +%Y-%m-%d)
          # Same reason as the version-bump step: git log HEAD would resolve to
          # the compile job's bot commit. Use the trigger event's message.
          MSG="${HEAD_COMMIT_MSG:-$(git log -1 --pretty=%s)}"
          # First line only, in case the trigger commit has a body.
          MSG=$(echo "$MSG" | head -n1)
          # Prepend new entry after the first heading line
          sed -i "0,/^## /s//## [${NEXT}] - ${DATE}\n\n- ${MSG}\n\n## /" CHANGELOG.md

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: bump version to v${{ steps.bump.outputs.next }} [skip ci]"
          git push

      - name: Create versioned release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.bump.outputs.next }}
          name: "v${{ steps.bump.outputs.next }}"
          body: ${{ github.event.head_commit.message }}
          files: resume.pdf
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="v${{ steps.bump.outputs.next }}"
          NOTES="Always points to the most recent resume version. Currently ${NEXT}."
          # Atomic-ish: create-if-missing, then upload with --clobber.
          # Avoids the old delete+recreate gap where downstream links 404.
          # --latest=false so the vX.Y.Z release stays "Latest" on the release page.
          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest resume.pdf \
              --title "Latest Resume" \
              --notes "$NOTES" \
              --latest=false
          else
            gh release upload latest resume.pdf --clobber
            gh release edit latest --notes "$NOTES"
          fi
