name: Compile Resume

on:
  push:
    branches: [main]
    paths:
      - "common/*.tex"
      - "variants/**/*.tex"
      - "cover-letters/*.tex"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile general resume
        uses: xu-cheng/latex-action@v4
        with:
          root_file: variants/general/resume.tex
          latexmk_use_xelatex: false
          work_in_root_file_dir: true

      - name: Compile devops variant
        uses: xu-cheng/latex-action@v4
        with:
          root_file: variants/devops/resume-devops.tex
          latexmk_use_xelatex: false
          work_in_root_file_dir: true

      - name: Compile cloud variant
        uses: xu-cheng/latex-action@v4
        with:
          root_file: variants/cloud/resume-cloud.tex
          latexmk_use_xelatex: false
          work_in_root_file_dir: true

      - name: Compile mlops variant
        uses: xu-cheng/latex-action@v4
        with:
          root_file: variants/mlops/resume-mlops.tex
          latexmk_use_xelatex: false
          work_in_root_file_dir: true

      - name: Compile aiml variant
        uses: xu-cheng/latex-action@v4
        with:
          root_file: variants/aiml/resume-aiml.tex
          latexmk_use_xelatex: false
          work_in_root_file_dir: true

      - name: Compile sde variant
        uses: xu-cheng/latex-action@v4
        with:
          root_file: variants/sde/resume-sde.tex
          latexmk_use_xelatex: false
          work_in_root_file_dir: true

      - name: Compile platform variant
        uses: xu-cheng/latex-action@v4
        with:
          root_file: variants/platform/resume-platform.tex
          latexmk_use_xelatex: false
          work_in_root_file_dir: true

      - name: Compile ai-tools variant
        uses: xu-cheng/latex-action@v4
        with:
          root_file: variants/ai-tools/resume-ai-tools.tex
          latexmk_use_xelatex: false
          work_in_root_file_dir: true

      - name: Compile cover letters
        uses: xu-cheng/latex-action@v4
        with:
          root_file: "cover-letters/*.tex"
          glob_root_file: true
          latexmk_use_xelatex: false
        continue-on-error: true

      - name: Move cover letter PDFs
        run: |
          mkdir -p cover-letters/pdf
          mv cover-letters/*.pdf cover-letters/pdf/ 2>/dev/null || true

      - name: Archive previous general resume
        run: |
          git checkout origin/main -- resume.pdf 2>/dev/null || true
          if [ -f resume.pdf ]; then
            mkdir -p resume-old
            DATE=$(date +%Y-%m-%d)
            HASH=$(git rev-parse --short HEAD)
            cp resume.pdf "resume-old/resume-${DATE}-${HASH}.pdf"
          fi
          git checkout -- . 2>/dev/null || true

      - name: Move compiled PDFs to final locations
        run: |
          # General resume goes to root
          cp variants/general/resume.pdf resume.pdf

          # Variant resumes go to builds/
          mkdir -p builds
          cp variants/devops/resume-devops.pdf builds/resume-devops.pdf
          cp variants/cloud/resume-cloud.pdf builds/resume-cloud.pdf
          cp variants/mlops/resume-mlops.pdf builds/resume-mlops.pdf
          cp variants/aiml/resume-aiml.pdf builds/resume-aiml.pdf
          cp variants/sde/resume-sde.pdf builds/resume-sde.pdf
          cp variants/platform/resume-platform.pdf builds/resume-platform.pdf
          cp variants/ai-tools/resume-ai-tools.pdf builds/resume-ai-tools.pdf

      - name: Verify all PDFs exist
        run: |
          echo "=== General ==="
          ls -la resume.pdf
          echo "=== Variants ==="
          ls -la builds/

      - name: Commit and push PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.pdf resume-old/ builds/ cover-letters/pdf/
          git diff --staged --quiet || git commit -m "chore: auto-compile resume PDFs"
          git push

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdfs
          path: |
            resume.pdf
            builds/*.pdf
            cover-letters/pdf/*.pdf
          retention-days: 90

  release:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (with compiled PDFs)
        run: git pull origin main

      - name: Determine version bump
        id: bump
        run: |
          CURRENT=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Check commit message for bump hints
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -qi '\[major\]'; then
            MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          elif echo "$MSG" | grep -qi '\[minor\]'; then
            MINOR=$((MINOR+1)); PATCH=0
          else
            PATCH=$((PATCH+1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "next=$NEXT" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump.outputs.next }}" > VERSION

      - name: Update CHANGELOG
        run: |
          NEXT="${{ steps.bump.outputs.next }}"
          DATE=$(date +%Y-%m-%d)
          MSG=$(git log -1 --pretty=%s)
          # Prepend new entry after the first heading line
          sed -i "0,/^## /s//## [${NEXT}] - ${DATE}\n\n- ${MSG}\n\n## /" CHANGELOG.md

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore: bump version to v${{ steps.bump.outputs.next }}"
          git push

      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.next }}
          name: "v${{ steps.bump.outputs.next }}"
          body: ${{ github.event.head_commit.message }}
          files: resume.pdf
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="v${{ steps.bump.outputs.next }}"
          # Delete old latest release and tag, then recreate
          gh release delete latest --yes 2>/dev/null || true
          git tag -d latest 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          # Create new latest release pointing to the same commit
          gh release create latest resume.pdf \
            --title "Latest Resume" \
            --notes "Always points to the most recent resume version. Currently ${NEXT}." \
            --latest=false
